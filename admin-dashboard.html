<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Duck - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Tajawal:wght@400;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <style>
        body { background-color: #1a1a1a; color: #fff; font-family: 'Poppins','Tajawal',sans-serif; margin:0; padding:20px; }
        .header { display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #333; padding-bottom:20px; margin-bottom:30px; }
        .header h1 { color:#ffd700; margin:0; }
        .btn { background:#ffd700; color:#000; border:none; padding:8px 16px; border-radius:5px; font-weight:bold; cursor:pointer; transition:0.3s; text-decoration:none; display:inline-block; font-family:inherit; }
        .btn:hover { background:#e6c200; }
        .btn-danger { background:#ff4d4d; color:white; }
        .btn-danger:hover { background:#e60000; }
        .btn-sm { padding:5px 10px; font-size:0.85rem; }
        .btn-success { background:#4CAF50; color:white; }
        .section-box { background:#252525; padding:20px; border-radius:10px; margin-bottom:20px; border:1px solid #333; }
        .form-group { margin-bottom:15px; }
        .form-group label { display:block; margin-bottom:5px; color:#ccc; font-size:0.9rem; }
        .form-group input, .form-group select { width:100%; padding:10px; background:#111; border:1px solid #444; color:#fff; border-radius:5px; font-family:inherit; box-sizing:border-box; }
        .flex-row { display:flex; gap:15px; align-items:flex-end; }
        .flex-row > div { flex:1; }
        table { width:100%; border-collapse:collapse; margin-top:10px; }
        th, td { text-align:left; padding:10px 12px; border-bottom:1px solid #444; vertical-align:middle; }
        th { color:#ffd700; background:#111; }

        /* Corner Card */
        .corner-card { margin-bottom:30px; background:#1e1e1e; border-radius:10px; overflow:hidden; border:1px solid #333; }
        .corner-header { display:flex; justify-content:space-between; align-items:center; background:#111; padding:12px 16px; border-left:4px solid #ffd700; cursor:grab; }
        .corner-header:active { cursor:grabbing; }
        .corner-header h3 { margin:0; color:#fff; font-size:1rem; }
        .drag-handle { color:#555; margin-right:10px; font-size:1.2rem; cursor:grab; }
        .drag-handle:hover { color:#ffd700; }
        .corner-body { padding:15px; }

        /* Sortable ghost effect */
        .sortable-ghost { opacity:0.3; background:#ffd700 !important; }
        .sortable-chosen { box-shadow:0 0 15px rgba(255,215,0,0.4); }

        /* Items table rows */
        .item-row { cursor:grab; }
        .item-row:active { cursor:grabbing; }
        .item-row:hover { background:#333; }
        .item-drag-handle { color:#555; cursor:grab; padding-right:8px; }
        .item-drag-handle:hover { color:#ffd700; }

        .tag { background:rgba(255,215,0,0.1); color:#ffd700; font-size:0.75rem; padding:2px 8px; border-radius:10px; margin-left:5px; }
    </style>
</head>
<body>

<div class="header">
    <h1>⚙ Admin Dashboard</h1>
    <div>
        <a href="index.html" class="btn" style="margin-right:10px;"><i class="fas fa-eye"></i> View Menu</a>
        <button class="btn btn-danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</div>

<!-- Add Forms -->
<div style="display:flex; gap:20px; flex-wrap:wrap;">
    <div class="section-box" style="flex:1; min-width:280px;">
        <h3 style="color:#ffd700; margin-top:0;">+ Add New Corner</h3>
        <form onsubmit="addCorner(event)">
            <div class="form-group"><label>English Name</label><input type="text" id="corner-en" required placeholder="Duck Espresso Corner"></div>
            <div class="form-group"><label>Arabic Name</label><input type="text" id="corner-ar" dir="rtl" required placeholder="ركن الإسبريسو"></div>
            <div class="form-group"><label>Image Filename</label><input type="text" id="corner-img" placeholder="espresso.jpeg"><small style="color:#888;">File must be in assets/images/</small></div>
            <button type="submit" class="btn">Add Corner</button>
        </form>
    </div>
    <div class="section-box" style="flex:2; min-width:300px;">
        <h3 style="color:#ffd700; margin-top:0;">+ Add New Item</h3>
        <form onsubmit="addItem(event)">
            <div class="form-group"><label>Select Corner</label><select id="item-corner" required><option value="">Loading...</option></select></div>
            <div class="flex-row">
                <div class="form-group"><label>English Name</label><input type="text" id="item-en" required></div>
                <div class="form-group"><label>Arabic Name</label><input type="text" id="item-ar" dir="rtl" required></div>
                <div class="form-group" style="flex:0.5;"><label>Price</label><input type="text" id="item-price" placeholder="45 / 55" required></div>
            </div>
            <button type="submit" class="btn">Add Item</button>
        </form>
    </div>
</div>

<!-- Menu Management -->
<div class="section-box">
    <h2 style="color:#ffd700; margin-top:0;">
        Manage Menu
        <span class="tag"><i class="fas fa-grip-lines"></i> Drag to reorder</span>
    </h2>
    <div id="corners-container">Loading...</div>
</div>

<script>
    if (!localStorage.getItem('adminToken')) window.location.href = 'admin.html';

    function logout() {
        fetch(`${API}/logout`, { method: 'POST', headers: { 'x-auth-token': TOKEN } });
        localStorage.removeItem('adminToken');
        window.location.href = 'admin.html';
    }

    const API = '/api';
    let cornersData = [];
    const TOKEN = localStorage.getItem('adminToken');
    const authHeaders = { 'Content-Type': 'application/json', 'x-auth-token': TOKEN };

    async function fetchData() {
        try {
            const res = await fetch(`${API}/corners`);
            cornersData = await res.json();
            renderAll();
        } catch(e) {
            document.getElementById('corners-container').innerHTML = '<p style="color:red;">Cannot connect to server.</p>';
        }
    }

    function renderAll() {
        const container = document.getElementById('corners-container');
        container.innerHTML = '';

        // Populate corner select
        const select = document.getElementById('item-corner');
        select.innerHTML = '<option value="">-- Choose Corner --</option>';
        cornersData.forEach(c => select.innerHTML += `<option value="${c.id}">${c.nameEn}</option>`);

        // Render each corner
        cornersData.forEach(corner => {
            const card = document.createElement('div');
            card.className = 'corner-card';
            card.dataset.id = corner.id;

            const itemsRows = corner.items.map(item => `
                <tr class="item-row" data-id="${item.id}">
                    <td><span class="item-drag-handle"><i class="fas fa-grip-vertical"></i></span></td>
                    <td>${item.nameEn}</td>
                    <td dir="rtl">${item.nameAr}</td>
                    <td><input type="text" value="${item.price}" id="price-${item.id}" style="width:90px;padding:4px;background:#111;color:#fff;border:1px solid #444;border-radius:4px;"></td>
                    <td>
                        <button class="btn btn-sm" onclick="savePrice(${item.id})">Save</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteItem(${item.id})">Delete</button>
                    </td>
                </tr>
            `).join('') || `<tr><td colspan="5" style="text-align:center;color:#666;">No items yet</td></tr>`;

            card.innerHTML = `
                <div class="corner-header">
                    <div style="display:flex;align-items:center;">
                        <span class="drag-handle"><i class="fas fa-grip-vertical"></i></span>
                        <div>
                            <h3>${corner.nameEn} <span style="color:#888;font-size:0.9rem;">| ${corner.nameAr}</span></h3>
                            <small style="color:#888;">${corner.imageName || 'No image'}</small>
                        </div>
                    </div>
                    <button class="btn btn-danger btn-sm" onclick="deleteCorner(${corner.id})">Delete Corner</button>
                </div>
                <div class="corner-body">
                    <table>
                        <thead><tr><th style="width:30px;"></th><th>Item (EN)</th><th>Item (AR)</th><th>Price</th><th>Actions</th></tr></thead>
                        <tbody id="items-${corner.id}">${itemsRows}</tbody>
                    </table>
                </div>
            `;
            container.appendChild(card);

            // Make items sortable
            if (corner.items.length > 1) {
                new Sortable(document.getElementById(`items-${corner.id}`), {
                    animation: 150,
                    handle: '.item-drag-handle',
                    ghostClass: 'sortable-ghost',
                    chosenClass: 'sortable-chosen',
                    onEnd: async () => {
                        const tbody = document.getElementById(`items-${corner.id}`);
                        const ids = [...tbody.querySelectorAll('tr[data-id]')].map(r => parseInt(r.dataset.id));
                        await fetch(`${API}/items/reorder`, {
                            method: 'PUT',
                            headers: authHeaders,
                            body: JSON.stringify({ ids })
                        });
                    }
                });
            }
        });

        // Make corners sortable
        new Sortable(container, {
            animation: 200,
            handle: '.drag-handle',
            ghostClass: 'sortable-ghost',
            chosenClass: 'sortable-chosen',
            onEnd: async () => {
                const ids = [...container.querySelectorAll('.corner-card[data-id]')].map(c => parseInt(c.dataset.id));
                await fetch(`${API}/corners/reorder`, {
                    method: 'PUT',
                    headers: authHeaders,
                    body: JSON.stringify({ ids })
                });
            }
        });
    }

    async function addCorner(e) {
        e.preventDefault();
        await fetch(`${API}/corners`, {
            method: 'POST',
            headers: authHeaders,
            body: JSON.stringify({ nameEn: document.getElementById('corner-en').value, nameAr: document.getElementById('corner-ar').value, imageName: document.getElementById('corner-img').value })
        });
        e.target.reset();
        fetchData();
    }

    async function addItem(e) {
        e.preventDefault();
        await fetch(`${API}/items`, {
            method: 'POST',
            headers: authHeaders,
            body: JSON.stringify({ cornerId: document.getElementById('item-corner').value, nameEn: document.getElementById('item-en').value, nameAr: document.getElementById('item-ar').value, price: document.getElementById('item-price').value })
        });
        e.target.reset();
        fetchData();
    }

    async function savePrice(id) {
        const row = document.getElementById(`price-${id}`).closest('tr');
        const nameEn = row.cells[1].innerText;
        const nameAr = row.cells[2].innerText;
        const price = document.getElementById(`price-${id}`).value;
        await fetch(`${API}/items/${id}`, { method:'PUT', headers: authHeaders, body: JSON.stringify({nameEn, nameAr, price}) });
        const btn = row.querySelector('.btn:not(.btn-danger)');
        btn.textContent = 'Saved!'; btn.style.background = '#4CAF50';
        setTimeout(() => { btn.textContent = 'Save'; btn.style.background = '#ffd700'; }, 1500);
    }

    async function deleteItem(id) {
        if (!confirm('Delete this item?')) return;
        await fetch(`${API}/items/${id}`, { method:'DELETE', headers: { 'x-auth-token': TOKEN } });
        fetchData();
    }

    async function deleteCorner(id) {
        if (!confirm('Delete this corner AND all its items?')) return;
        await fetch(`${API}/corners/${id}`, { method:'DELETE', headers: { 'x-auth-token': TOKEN } });
        fetchData();
    }

    fetchData();
</script>
</body>
</html>
