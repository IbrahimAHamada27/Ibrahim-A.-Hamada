<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Duck - Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a; color: #ffffff; font-family: 'Poppins', sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;
        }
        .login-box {
            background: #252525; padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
            width: 90%; max-width: 400px; border: 1px solid rgba(255,215,0,0.2);
        }
        .login-box h2 { color: #ffd700; margin-bottom: 25px; letter-spacing: 1px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #ccc; }
        .input-group input, .input-group select {
            width: 100%; padding: 12px; border: 1px solid #444; border-radius: 8px;
            background: #111; color: #fff; outline: none; font-family: inherit; box-sizing: border-box;
        }
        .input-group input:focus, .input-group select:focus { border-color: #ffd700; }
        .btn-login {
            background: #ffd700; color: #000; border: none; padding: 12px 0; width: 100%;
            border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-login:hover { background: #e6c200; transform: translateY(-2px); }
        #error-msg { color: #ff4d4d; margin-top: 15px; font-size: 0.9rem; }
        .back-link { display: inline-block; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .back-link:hover { color: #ffd700; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>System Login</h2>
        <div class="input-group">
            <label>Role</label>
            <select id="role">
                <option value="cashier">Cashier</option>
                <option value="admin">Administrator</option>
            </select>
        </div>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button class="btn-login" onclick="login()">Login</button>
        <div id="error-msg"></div>
        <a href="index.html" class="back-link">Return to Menu</a>
    </div>

    <script>
        async function login() {
            const role = document.getElementById('role').value;
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            errorMsg.textContent = '';

            try {
                // Determine which endpoint to call based on role
                const endpoint = role === 'admin' ? '/api/login' : '/api/pos/login';
                
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                const data = await response.json();

                if (data.success) {
                    if (role === 'admin') {
                        localStorage.setItem('adminToken', data.token); // Legacy support for admin dashboard
                        // Wait, to secure the whole app against the new JWT backend, we also set posToken
                        localStorage.setItem('posToken', data.token);
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        localStorage.setItem('posToken', data.token);
                        localStorage.setItem('posUser', JSON.stringify(data.user));
                        window.location.href = 'cashier.html';
                    }
                } else {
                    errorMsg.textContent = data.message || 'Login failed - Incorrect credentials';
                }
            } catch (error) {
                console.error('Error logging in:', error);
                errorMsg.textContent = 'Server error. Try again later.';
            }
        }

        // Allow pressing Enter to login
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
